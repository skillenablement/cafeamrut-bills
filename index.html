const loadPasswordsFromDB = async () => {
  try {
    // 3 second timeout — if Supabase unreachable, fall back to defaults immediately
    const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),3000));
    const query = sbClient.from("settings").select("value").eq("key","passwords").single();
    const {data,error} = await Promise.race([query, timeout]);
    if(error || !data) return {...DEFAULT_PASSWORDS};
    return JSON.parse(data.value);
  } catch { return {...DEFAULT_PASSWORDS}; }
};

const toDataUrl = f => new Promise((ok,fail)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=fail;r.readAsDataURL(f);});

// Resize thumbnail to small jpeg dataurl to keep storage small (~5-10KB)
const makeThumbnail = (file) => new Promise((ok)=>{
  if(file.type==="application/pdf"){ok(null);return;}
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    const max=120;
    const ratio=Math.min(max/img.width,max/img.height);
    canvas.width=img.width*ratio;canvas.height=img.height*ratio;
    canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    ok(canvas.toDataURL("image/jpeg",0.7));
  };
  img.onerror=()=>{URL.revokeObjectURL(url);ok(null);};
  img.src=url;
});

// Cell with tooltip
function TipCell({value,style={}}){
  const [tip,setTip]=useState(false);
  if(!value||value==="—") return <td style={{padding:"10px 10px",color:"#d1d5db",borderRight:"1px solid #e5e7eb",...style}}>—</td>;
  return(
    <td style={{padding:"10px 10px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",position:"relative",cursor:"default",borderRight:"1px solid #e5e7eb",...style}}
      onMouseEnter={()=>setTip(true)} onMouseLeave={()=>setTip(false)}>
      {value}
      {tip&&<div style={{position:"absolute",bottom:"calc(100% + 6px)",left:0,background:"#1f2937",color:"#fff",fontSize:11,padding:"5px 9px",borderRadius:6,whiteSpace:"nowrap",zIndex:9999,pointerEvents:"none",boxShadow:"0 4px 12px rgba(0,0,0,0.3)",maxWidth:300}}>
        {value}
        <div style={{position:"absolute",bottom:-4,left:14,width:8,height:8,background:"#1f2937",transform:"rotate(45deg)"}}/>
      </div>}
    </td>
  );
}

// Inline editable cell — click to edit, Enter/blur to save
function EditCell({value, onSave, type="text", style={}}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value||"");
  const inputRef=useRef();
  useEffect(()=>{setVal(value||"");},[value]);
  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);

  const commit=()=>{setEditing(false);if(val!==value)onSave(val);};
  const cancel=()=>{setEditing(false);setVal(value||"");};

  if(editing) return(
    <td style={{padding:"4px 6px",borderRight:"1px solid #e5e7eb",...style}} onClick={e=>e.stopPropagation()}>
      <input ref={inputRef} className="inline-edit-input" type={type} value={val}
        onChange={e=>setVal(e.target.value)}
        onBlur={commit}
        onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")cancel();}}
      />
    </td>
  );

  const display = type==="date" && val ? fmtDate(val) : val;
  return(
    <td onClick={()=>setEditing(true)} title={`Click to edit: ${display||"—"}`}
      style={{padding:"10px 10px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",position:"relative",cursor:"text",borderRight:"1px solid #e5e7eb",...style}}>
      <span style={{display:"flex",alignItems:"center",gap:4,minHeight:18}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{display||<span style={{color:"#d1d5db"}}>—</span>}</span>
        <span style={{fontSize:10,color:"#93c5fd",flexShrink:0,opacity:0.7}}>✏</span>
      </span>
    </td>
  );
}

// ── PENDING BILLS DASHBOARD ──
function PendingDashboard({bills, onClose, onMarkPaid}){
  const pending = bills.filter(b=>b.paymentStatus==="Pending");

  const grouped = {};
  pending.forEach(b=>{
    const key=(b.vendorName||"Unknown Vendor").trim();
    if(!grouped[key]) grouped[key]={vendorName:key,vendorType:b.vendorType||"",ids:[],totalAmount:0,count:0};
    grouped[key].ids.push(b.id);
    grouped[key].totalAmount+=Number(b.totalAmount||0);
    grouped[key].count++;
  });

  const rows=Object.values(grouped).sort((a,b)=>b.totalAmount-a.totalAmount);
  const grandTotal=rows.reduce((s,r)=>s+r.totalAmount,0);
  const totalBills=pending.length;
  const fmtAmt=n=>`₹${Number(n).toLocaleString("en-IN",{maximumFractionDigits:2})}`;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:9999,padding:"20px 16px",overflowY:"auto"}}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:760,boxShadow:"0 24px 60px rgba(0,0,0,0.2)",marginTop:20,marginBottom:20}}>

        {/* Header */}

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:24}}>📊</span>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,color:"#fff",marginBottom:2}}>Pending Bills Dashboard</h2>
                <p style={{fontSize:12,color:"rgba(255,255,255,0.65)"}}>Vendor-wise summary of all unpaid bills</p>
              </div>
            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>← Back</button>
          </div>
          {/* 3 summary cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            {[
              {l:"Vendors with pending",v:rows.length,icon:"🏪"},
              {l:"Total pending bills",v:totalBills,icon:"🧾"},
              {l:"Total amount due",v:fmtAmt(grandTotal),icon:"💰"},
            ].map(s=>(
              <div key={s.l} style={{background:"rgba(255,255,255,0.12)",borderRadius:10,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.2)"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:18}}>{s.icon}</span>
                  <p style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>{s.l}</p>
                </div>
                <p style={{fontSize:22,fontWeight:700,color:"#fff"}}>{s.v}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Vendor rows */}
        <div style={{padding:"24px 28px"}}>
          {rows.length===0?(
            <div style={{textAlign:"center",padding:"48px 20px"}}>
              <div style={{fontSize:48,marginBottom:12}}>✅</div>
              <p style={{fontSize:16,fontWeight:700,color:"#16a34a",marginBottom:4}}>All bills are paid!</p>
              <p style={{fontSize:13,color:"#9ca3af"}}>No pending payments at the moment.</p>
            </div>
          ):(
            <>
              {/* Table header */}
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,padding:"8px 16px",marginBottom:8}}>
                {["Vendor Name","Bills Pending","Amount Due"].map((h,i)=>(
                  <div key={i} style={{fontSize:11,fontWeight:600,color:"#9ca3af",textAlign:i>=2?"right":"left",textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</div>
                ))}
              </div>

              {/* Vendor rows */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {rows.map((row,idx)=>(
                  <div key={row.vendorName} style={{
                    display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,
                    alignItems:"center",padding:"16px",borderRadius:10,
                    background:idx%2===0?"#f9fafb":"#fff",
                    border:"1px solid #e5e7eb"
                  }}>
                    {/* Vendor name + type */}
                    <div>
                      <p style={{fontWeight:700,fontSize:14,color:"#111",marginBottom:3}}>{row.vendorName}</p>
                      {row.vendorType&&<span style={{background:"#eff6ff",color:"#2563eb",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:500}}>{row.vendorType}</span>}
                    </div>
                    {/* Bill count */}
                    <div style={{textAlign:"right"}}>
                      <span style={{display:"inline-block",background:"#fffbeb",color:"#d97706",border:"1px solid #fcd34d",borderRadius:6,padding:"4px 12px",fontSize:13,fontWeight:700}}>
                        {row.count} {row.count===1?"bill":"bills"}
                      </span>
                    </div>
                    {/* Amount */}
                    <div style={{textAlign:"right"}}>
                      <p style={{fontSize:16,fontWeight:700,color:"#dc2626"}}>{fmtAmt(row.totalAmount)}</p>
                    </div>

                  </div>
                ))}
              </div>

              {/* Grand total row */}
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,alignItems:"center",padding:"14px 16px",marginTop:12,borderRadius:10,background:"#1e3a5f"}}>
                <p style={{fontWeight:700,color:"#fff",fontSize:13}}>Grand Total</p>
                <div style={{textAlign:"right"}}>
                  <span style={{color:"#fbbf24",fontWeight:700,fontSize:13}}>{totalBills} bills</span>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:17,fontWeight:700,color:"#fbbf24"}}>{fmtAmt(grandTotal)}</p>
                </div>
                </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function RemarksCell({value, onSave, isAdmin}){
  const [hovered,setHovered]=useState(false);
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value||"");
  const inputRef=useRef();
  useEffect(()=>{setVal(value||"");},[value]);
  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);

  const commit=()=>{setEditing(false);setHovered(false);if(val!==(value||""))onSave(val);};
  const cancel=()=>{setEditing(false);setVal(value||"");};
  const hasRemark=value&&value.trim().length>0;

  if(editing&&isAdmin) return(
    <td style={{padding:"4px 6px",borderRight:"1px solid #e5e7eb",overflow:"visible"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <input ref={inputRef} value={val} onChange={e=>setVal(e.target.value)}
          onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")cancel();}}
          placeholder="Add a remark…"

          {isAdmin&&<p style={{fontSize:10,color:"#9ca3af",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Remark · click to edit</p>}

  const handleSave=async(role)=>{
    const f=fields[role];
    const errs={};
    // Always load latest from DB to verify current password
    const latestPw = await loadPasswordsFromDB();
    _cachedPasswords = latestPw;
    const currentPw=latestPw[role];

    setFields(p=>({...p,[role]:{cur:"",newP:"",confirm:""}}));

      {errors[role]?.[field]&&<p style={{fontSize:11,color:"#dc2626",marginTop:3}}>{errors[role][field]}</p>}
    </div>;
  };

  const Panel=({role,label,color})=>(
    <div style={{padding:"16px",background:role==="admin"?"#eff6ff":"#f0fdf4",borderRadius:10,border:`1px solid ${role==="admin"?"#bfdbfe":"#bbf7d0"}`}}>

      <button onClick={()=>handleSave(role)}
        style={{width:"100%",background:color,color:"#fff",border:"none",borderRadius:7,padding:"9px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
        Update {label} Password
      </button>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}}>
      <div style={{background:"#fff",borderRadius:14,padding:"28px",maxWidth:480,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <h2 style={{fontSize:17,fontWeight:700}}>🔐 Change Passwords</h2>

          {[{k:"admin",l:"👑 Admin",c:"#2563eb"},{k:"viewer",l:"👁 Viewer",c:"#16a34a"}].map(t=>(

function App(){
  const [bills,setBills]=useState([]);
  const [loading,setLoading]=useState(true);
  const [apiKey,setApiKey]=useState(null);
  const [showKeyModal,setShowKeyModal]=useState(false);
  const [prog,setProg]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editF,setEditF]=useState({});
  const [toast,setToast]=useState(null);
  const [drag,setDrag]=useState(false);
  const [filter,setFilter]=useState("All");
  const [search,setSearch]=useState("");
  const [delTarget,setDelTarget]=useState(null);
  const [selected,setSelected]=useState(new Set());
  const [dupModal,setDupModal]=useState(null);
  const [saveStatus,setSaveStatus]=useState("idle");
  const [currentUser,setCurrentUser]=useState(null);
  const isAdmin = currentUser?.role==="admin";
  const [showPwModal,setShowPwModal]=useState(false);
  const [showManualForm,setShowManualForm]=useState(false);
  const emptyManual = ()=>({vendorName:"",vendorType:"",invoiceNumber:"",date:"",totalAmount:"",paymentStatus:"Pending",remarks:""});
  const [manualForm,setManualForm]=useState(emptyManual());
  const [manualErrors,setManualErrors]=useState({});
  const [showImportModal,setShowImportModal]=useState(false);
  const [newlyImportedIds,setNewlyImportedIds]=useState(new Set());
  const [showDashboard,setShowDashboard]=useState(false);
  const [dateSort,setDateSort]=useState("desc");
  const [vendorSort,setVendorSort]=useState(null);
  const [amountSort,setAmountSort]=useState(null);
  const [cols,setCols]=useState(DEFAULT_COLS);
  const fileRef=useRef();
  const billsRef=useRef([]);
  useEffect(()=>{billsRef.current=bills;},[bills]);

  useEffect(()=>{
    const savedAuth=localStorage.getItem(AUTH_LS);
    if(savedAuth){try{setCurrentUser(JSON.parse(savedAuth));}catch{}}
    const savedKey=localStorage.getItem(API_KEY_LS);
    if(savedKey)setApiKey(savedKey);else setShowKeyModal(true);
    // Pre-load passwords from Supabase into cache
    loadPasswordsFromDB().then(pw=>{ _cachedPasswords=pw; });
    loadBills();
  },[]);

  const loadBills=async()=>{
    setLoading(true);
    try{const data=await dbLoad();setBills(data);billsRef.current=data;}
    catch(e){notify("Could not load bills from database.","err");}
    setLoading(false);
  };

  const notify=(msg,t="ok")=>{setToast({msg,t});setTimeout(()=>setToast(null),4000);};
  const askDup=(nb,eb)=>new Promise(r=>setDupModal({nb,eb,r}));
  const setCol=(key,w)=>setCols(p=>({...p,[key]:w}));

  const handleApiKeySave=(key)=>{localStorage.setItem(API_KEY_LS,key);setApiKey(key);setShowKeyModal(false);notify("API key saved!");};
  const handleLogin=(user)=>{localStorage.setItem(AUTH_LS,JSON.stringify(user));setCurrentUser(user);};
  const handleLogout=()=>{localStorage.removeItem(AUTH_LS);setCurrentUser(null);};

  const saveManualBill=async()=>{
    const errs={};
    if(!manualForm.vendorName.trim()) errs.vendorName="Vendor name is required.";
    if(!manualForm.totalAmount||isNaN(Number(manualForm.totalAmount))) errs.totalAmount="Valid amount is required.";
    if(!manualForm.date) errs.date="Date is required.";
    if(Object.keys(errs).length){setManualErrors(errs);return;}
    const bill={
      id:crypto.randomUUID(), srNo:billsRef.current.length+1,
      vendorName:manualForm.vendorName.trim(), vendorType:manualForm.vendorType,
      invoiceNumber:manualForm.invoiceNumber.trim(), date:manualForm.date,
      totalAmount:manualForm.totalAmount, paymentStatus:manualForm.paymentStatus,
      remarks:manualForm.remarks.trim(), thumbnail:null
    };
    // Check duplicate
    const dup=isDup(bill,billsRef.current);
    if(dup){
      const go=await askDup(bill,dup);
      if(!go) return;
    }
    setSaveStatus("saving");
    try{
      await dbInsert(bill);
      const updated=[...billsRef.current,bill];
      updated.forEach((b,i)=>b.srNo=i+1);
      setBills(updated);billsRef.current=updated;
      setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);
      setManualForm(emptyManual());setManualErrors({});setShowManualForm(false);
      notify("Bill added successfully!");
    }catch(e){setSaveStatus("error");notify("Could not save bill.","err");}
  };

  const extract=async(file,cur)=>{
    const isImg=file.type.startsWith("image/"),isPdf=file.type==="application/pdf";
    if(!isImg&&!isPdf)return null;
    const data=await toBase64(file);
    const blk=isImg?{type:"image",source:{type:"base64",media_type:file.type,data}}:{type:"document",source:{type:"base64",media_type:"application/pdf",data}};
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        system:"Extract bill details, return ONLY JSON: {vendorName, vendorType (Bakery/Grocery/Beverage/Dairy/Meat & Seafood/Produce/Packaging/Cleaning/Equipment/Utilities/Other), invoiceNumber, date (YYYY-MM-DD), totalAmount (number only)}. Empty string if unclear.",
        messages:[{role:"user",content:[blk,{type:"text",text:"Extract bill details."}]}]})
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API error");}
    const d=await res.json();
    const raw=(d.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
    let p={};try{p=JSON.parse(raw);}catch{}
    const thumb=await makeThumbnail(file);
    return{id:crypto.randomUUID(),srNo:cur.length+1,vendorName:p.vendorName||"",vendorType:p.vendorType||"",
      invoiceNumber:p.invoiceNumber||"",date:p.date||"",totalAmount:p.totalAmount||"",
      paymentStatus:"Pending",remarks:"",thumbnail:thumb};
  };

  // ── DOWNLOAD EXCEL TEMPLATE ──
  const downloadTemplate=()=>{
    const b64=window.TEMPLATE_B64;
    if(!b64){alert("Template not available. Please refresh.");return;}
    const bc=atob(b64),ba=new Uint8Array(bc.length);
    for(let i=0;i<bc.length;i++)ba[i]=bc.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([ba],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}));
    const a=document.createElement("a");a.href=url;a.download="CafeAmrut_BillImport_Template.xlsx";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  

  // ── BULK IMPORT FROM EXCEL ──
  const handleBulkImport=async(file,onResult)=>{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});

        if(!rows.length){onResult({errors:["The Excel file is empty. Please use the template and add at least one row."],imported:0,newIds:[]});return;}

        // Auto-skip sample rows
        const filteredRows=rows.filter(row=>{
          const vn=String(row["Vendor Name"]||"").toLowerCase();
          return !(vn.includes("sample")||vn.includes("delete me")||vn.includes("delete this")||vn.includes("★")||vn.includes("reference")||vn.trim()==="");
        });
        const skippedSample=rows.length-filteredRows.length;
        const rows2=filteredRows;

        if(!rows2.length){
          const msg=skippedSample>0?"Only the sample row was found — it was automatically skipped. Please add your actual bill data and re-import.":"The Excel file is empty. Please use the template and add at least one row.";
          onResult({errors:[],imported:0,newIds:[],sampleNote:skippedSample>0?`✅ Sample row automatically removed.`:null,infoMsg:msg});return;
        }

        const required=["Vendor Name","Date","Total Amount"];
        const firstRow=rows[0];
        const missingHeaders=required.filter(h=>!(h in firstRow));
        if(missingHeaders.length>0){onResult({errors:[`Missing required columns: ${missingHeaders.join(", ")}. Please use the downloaded template.`],imported:0,newIds:[]});return;}

        const errors=[];
        const validBills=[];
        const currentBills=billsRef.current;
        let sampleNote = skippedSample>0 ? `✅ Sample row automatically removed — ${skippedSample} template row(s) skipped as expected.` : null;

        rows2.forEach((row,i)=>{
          const rowNum=i+2;
          const rowErrors=[];
          const vendorName=String(row["Vendor Name"]||"").trim();
          const rawDate=String(row["Date"]||"").trim();
          const totalAmount=String(row["Total Amount"]||"").trim();
          const invoiceNumber=String(row["Invoice Number"]||"").trim();
          const vendorType=String(row["Vendor Type"]||"").trim();
          const paymentStatus=String(row["Payment Status"]||"Pending").trim();
          const remarks=String(row["Remarks"]||"").trim();

          // Date might come as serial number from Excel — convert if needed
          let date=rawDate;
          if(rawDate&&/^\d+$/.test(rawDate)){
            // Excel serial date
            const d=new Date((Number(rawDate)-25569)*86400*1000);
            date=d.toISOString().slice(0,10);
          } else if(rawDate&&rawDate.includes("/")){
            // MM/DD/YYYY or DD/MM/YYYY
            const parts=rawDate.split("/");
            if(parts.length===3){
              const y=parts[2].length===4?parts[2]:"20"+parts[2];
              date=`${y}-${parts[0].padStart(2,"0")}-${parts[1].padStart(2,"0")}`;
            }
          }

          if(!vendorName)rowErrors.push("Vendor Name is empty");
          if(!totalAmount)rowErrors.push("Total Amount is empty");
          else if(isNaN(Number(totalAmount)))rowErrors.push(`Total Amount "${totalAmount}" is not a valid number`);
          if(date&&!/^\d{4}-\d{2}-\d{2}$/.test(date))rowErrors.push(`Date "${rawDate}" is invalid — must be YYYY-MM-DD format`);
          if(vendorType&&!VENDOR_TYPES.includes(vendorType))rowErrors.push(`Vendor Type "${vendorType}" is invalid`);
          if(paymentStatus&&!["Pending","Paid"].includes(paymentStatus))rowErrors.push(`Payment Status "${paymentStatus}" must be Pending or Paid`);

          if(rowErrors.length>0){errors.push(`Row ${rowNum} (${vendorName||"unnamed"}): ${rowErrors.join("; ")}`);return;}

          const dupExisting=invoiceNumber&&currentBills.find(b=>(b.invoiceNumber||"").trim().toLowerCase()===invoiceNumber.toLowerCase()&&String(b.totalAmount||"").trim()===totalAmount);
          if(dupExisting){errors.push(`Row ${rowNum} (${vendorName}): DUPLICATE — Invoice "${invoiceNumber}" with amount ₹${totalAmount} already exists (Bill #${dupExisting.srNo})`);return;}

          const dupInFile=validBills.find(b=>invoiceNumber&&(b.invoiceNumber||"").trim().toLowerCase()===invoiceNumber.toLowerCase()&&String(b.totalAmount||"").trim()===totalAmount);
          if(dupInFile){errors.push(`Row ${rowNum} (${vendorName}): DUPLICATE within import file — Invoice "${invoiceNumber}" appears more than once`);return;}

          validBills.push({id:crypto.randomUUID(),srNo:currentBills.length+validBills.length+1,vendorName,vendorType,invoiceNumber,date,totalAmount,paymentStatus:["Pending","Paid"].includes(paymentStatus)?paymentStatus:"Pending",remarks,thumbnail:null});
        });

        if(validBills.length===0&&errors.length>0){onResult({errors,imported:0,newIds:[]});return;}

        setSaveStatus("saving");
        const newIds=[];
        let insertedCount=0;
        for(const bill of validBills){
          try{await dbInsert(bill);newIds.push(bill.id);insertedCount++;}
          catch(e){errors.push(`Failed to save "${bill.vendorName}": ${e.message||"database error"}`);}
        }

        if(insertedCount>0){
          const updated=[...currentBills,...validBills.slice(0,insertedCount)];
          updated.forEach((b,i)=>b.srNo=i+1);
          setBills(updated);billsRef.current=updated;
          setNewlyImportedIds(new Set(newIds));
          setTimeout(()=>setNewlyImportedIds(new Set()),8000);
        }
        setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);
        onResult({errors,imported:insertedCount,newIds,sampleNote});
      }catch(err){onResult({errors:[`Could not read Excel file: ${err.message}. Use the correct template.`],imported:0,newIds:[]});}
    };
    reader.readAsArrayBuffer(file);
  };

  const handleFiles=async files=>{
    if(!apiKey){setShowKeyModal(true);return;}
    const valid=Array.from(files).filter(f=>f.type.startsWith("image/")||f.type==="application/pdf");
    if(!valid.length){
      const types=Array.from(files).map(f=>f.type||"unknown").join(", ");
      notify(`Upload images or PDFs only. Got: ${types}`,"err");
      return;
    }
    setProg({cur:0,total:valid.length,name:""});
    let cur=[...billsRef.current],added=0,skipped=0,failed=0,lastError="";
    for(let i=0;i<valid.length;i++){
      const f=valid[i];setProg({cur:i+1,total:valid.length,name:f.name});
      try{
        const bill=await extract(f,cur);if(!bill){failed++;continue;}
        const dup=isDup(bill,cur);
        if(dup){const go=await askDup(bill,dup);if(!go){skipped++;continue;}}
        setSaveStatus("saving");
        await dbInsert(bill);
        setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);
        cur=[...cur,bill];cur.forEach((x,idx)=>x.srNo=idx+1);
        setBills([...cur]);billsRef.current=[...cur];added++;
      }catch(e){
        console.error(e);
        lastError=e?.message||String(e)||"Unknown error";
        failed++;
      }
    }
    setProg(null);
    if(failed>0&&lastError){
      notify(`Upload failed: ${lastError}`,"err");
    } else {
      const pts=[];if(added)pts.push(`${added} added`);if(skipped)pts.push(`${skipped} skipped`);if(failed)pts.push(`${failed} failed`);
      notify(pts.join(", ")+".",failed?"warn":"ok");
    }
  };

  const quickUpdate=async(id,field,value)=>{
    const bill=billsRef.current.find(b=>b.id===id);if(!bill)return;
    const updated={...bill,[field]:value};
    try{await dbUpdate(updated);setBills(p=>p.map(b=>b.id===id?updated:b));billsRef.current=billsRef.current.map(b=>b.id===id?updated:b);setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);}
    catch(e){notify("Could not save field.","err");}
  };

  const saveEdit=async()=>{

    catch(e){setSaveStatus("error");notify("Could not save update.","err");}
  };

  const delOne=async id=>{

    try{await dbDelete(id);const updated=bills.filter(b=>b.id!==id).map((b,i)=>({...b,srNo:i+1}));setBills(updated);billsRef.current=updated;setDelTarget(null);setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);notify("Bill deleted.");}
    catch(e){setSaveStatus("error");notify("Could not delete.","err");}
  };

  const delSel=async()=>{

    try{await dbDelete(ids);const updated=bills.filter(b=>!selected.has(b.id)).map((b,i)=>({...b,srNo:i+1}));setBills(updated);billsRef.current=updated;setSelected(new Set());setDelTarget(null);setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);notify(`${c} bill${c>1?"s":""} deleted.`);}
    catch(e){setSaveStatus("error");notify("Could not delete.","err");}
  };

  const toggleStatus=async id=>{

    try{await dbUpdate({...bill,paymentStatus:newStatus});setBills(p=>p.map(b=>b.id===id?{...b,paymentStatus:newStatus}:b));notify(`Marked as ${newStatus}.`);}
    catch(e){notify("Could not update status.","err");}
  };

  const markMultiplePaid=async(ids)=>{

    for(const id of ids){

    const updated=billsRef.current.map(b=>ids.includes(b.id)?{...b,paymentStatus:"Paid"}:b);
    setBills(updated);billsRef.current=updated;
    setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);
    notify(`${count} bill${count!==1?"s":""} marked as Paid.`);
  };

  const toggleSel=id=>setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll=()=>{const ids=new Set(filtered.map(b=>b.id));setSelected(p=>filtered.every(b=>p.has(b.id))?new Set():ids);};

  const dlXlsx=()=>{

    const ws=XLSX.utils.json_to_sheet(rows);ws["!cols"]=[6,22,16,18,14,18,15,28].map(wch=>({wch}));
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Bills");

  const saveInd=saveStatus==="saving"?{l:"Saving…",c:"#d97706",bg:"#fffbeb",bd:"#fcd34d"}:saveStatus==="saved"?{l:"✓ Saved",c:"#16a34a",bg:"#f0fdf4",bd:"#86efac"}:saveStatus==="error"?{l:"⚠ Failed",c:"#dc2626",bg:"#fef2f2",bd:"#fca5a5"}:null;

    outBtn:{background:"#fff",color:"#374151",border:"1px solid #d1d5db",borderRadius:7,padding:"8px 14px",fontSize:13,cursor:"pointer"},
    input:{border:"1px solid #d1d5db",borderRadius:7,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box"},
    chk:on=>({width:18,height:18,borderRadius:3,border:`2px solid ${on?"#2563eb":"#9ca3af"}`,background:on?"#2563eb":"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,userSelect:"none"}),
    fBtn:on=>({padding:"5px 12px",fontSize:12,cursor:"pointer",borderRadius:6,background:on?"#eff6ff":"#fff",color:on?"#2563eb":"#6b7280",border:`1px solid ${on?"#93c5fd":"#d1d5db"}`}),
  };

  const TH=({k,label,onClick,align="left"})=>(
    <th onClick={onClick} style={{width:cols[k],padding:0,position:"relative",cursor:onClick?"pointer":"default",borderRight:"1px solid #e5e7eb",background:"#f9fafb"}}>

    </th>

  return(

      {showDashboard&&<PendingDashboard bills={bills} onClose={()=>setShowDashboard(false)} onMarkPaid={async(ids)=>{await markMultiplePaid(ids);}}/>}

        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
            <h1 style={{fontSize:22,fontWeight:700}}>CafeAmrut Bill Manager</h1>
            {saveInd&&<span className="fade" style={{fontSize:11,fontWeight:600,color:saveInd.c,background:saveInd.bg,border:`1px solid ${saveInd.bd}`,borderRadius:20,padding:"2px 10px"}}>{saveInd.l}</span>}

      )}

      {isAdmin&&!showManualForm&&<div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:8}}>
        <button onClick={()=>setShowImportModal(true)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",background:"#fff",color:"#16a34a",border:"1px solid #86efac",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>📊 Bulk Import Excel</button>
        <button onClick={()=>setShowManualForm(true)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",background:"#fff",color:"#2563eb",border:"1px solid #93c5fd",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>✏️ Add Bill Manually</button>
      </div>}

      {isAdmin&&<div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}} onClick={()=>!prog&&fileRef.current?.click()} style={{border:`2px dashed ${drag?"#3b82f6":"#d1d5db"}`,borderRadius:12,padding:"24px 20px",textAlign:"center",cursor:prog?"default":"pointer",background:drag?"#eff6ff":"#fff",marginBottom:20,transition:"all .15s"}}>
        <input ref={fileRef} type="file" multiple accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>{handleFiles(e.target.files);e.target.value="";}}/>
        {prog?(<div><p style={{margin:"0 0 10px",fontSize:13,color:"#6b7280"}}>Processing {prog.cur} of {prog.total} — {prog.name}</p><div style={{height:6,background:"#e5e7eb",borderRadius:99,maxWidth:320,margin:"0 auto"}}><div style={{height:"100%",borderRadius:99,background:"#3b82f6",width:`${(prog.cur/prog.total)*100}%`,transition:"width .3s"}}/></div></div>):(<><div style={{fontSize:30,marginBottom:8}}>📎</div><p style={{fontSize:14,fontWeight:600,marginBottom:4}}>Drop bill photos or PDFs here</p><p style={{fontSize:12,color:"#9ca3af"}}>or click to browse · JPG, PNG, PDF · multiple files supported</p></>)}
      </div>}

      {/* SEARCH + FILTER */}
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <input style={{...C.input,flex:1,minWidth:160}} type="text" placeholder="Search vendor, type or invoice…" value={search} onChange={e=>setSearch(e.target.value)}/>
        {["All","Pending","Paid"].map(s=><button key={s} style={C.fBtn(filter===s)} onClick={()=>setFilter(s)}>{s}</button>)}
        <button style={{...C.outBtn,fontSize:11,color:"#9ca3af",padding:"5px 10px"}} onClick={()=>setCols(DEFAULT_COLS)}>↺ Cols</button>
      </div>

      {isAdmin&&filtered.length>0&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:ns>0?"#fef2f2":"#f9fafb",border:`1px solid ${ns>0?"#fca5a5":"#e5e7eb"}`,borderRadius:8,marginBottom:8,flexWrap:"wrap",gap:8}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}} onClick={toggleAll}>
            <div style={C.chk(allSel)}>{allSel&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div>
            <span style={{fontSize:13,color:ns>0?"#dc2626":"#374151",fontWeight:ns>0?600:400}}>{ns>0?`${ns} bill${ns>1?"s":""} selected`:"Select all"}</span>
          </label>
          {ns>0&&<button style={C.redBtn} onClick={()=>setDelTarget("bulk")}>🗑 Delete {ns} selected</button>}
        </div>
      )}

      {bills.length>0&&!loading&&(<div style={{fontSize:11,color:"#9ca3af",marginBottom:6,padding:"0 2px"}}>✏ Click any <span style={{color:"#2563eb",fontWeight:600}}>Vendor</span>, <span style={{color:"#2563eb",fontWeight:600}}>Invoice</span>, or <span style={{color:"#2563eb",fontWeight:600}}>Date</span> cell to edit directly · Enter to save, Esc to cancel</div>)}

      {loading?(<div style={{textAlign:"center",padding:"48px",background:"#fff",borderRadius:12,border:"1px solid #e5e7eb"}}><div style={{width:32,height:32,border:"3px solid #3b82f6",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 12px"}}/><p style={{fontSize:13,color:"#6b7280"}}>Loading your bills from cloud…</p></div>
      ):filtered.length===0?(<div style={{textAlign:"center",padding:"48px",color:"#9ca3af",background:"#fff",borderRadius:12,border:"1px solid #e5e7eb"}}><div style={{fontSize:40,marginBottom:10}}>🧾</div><p style={{fontSize:14}}>{bills.length===0?"No bills yet — upload your first bill above.":"No bills match your search."}</p></div>
      ):(
        <div style={{overflowX:"auto",border:"1px solid #e5e7eb",borderRadius:12,background:"#fff"}}>
          <table className="cbm-table">
            <colgroup>{Object.entries(cols).map(([k,w])=><col key={k} style={{width:w}}/>)}</colgroup>
            <thead>
              <tr>
                <th style={{width:cols.thumb,padding:0,position:"relative",borderRight:"1px solid #e5e7eb",background:"#f9fafb"}}><div style={{padding:"10px 10px",fontWeight:600,color:"#6b7280",fontSize:11}}>Bill</div><div className="resize-handle" onMouseDown={makeResize("thumb")} onClick={e=>e.stopPropagation()}><div className="rh-line" style={{width:2,height:"60%",background:"#d1d5db",borderRadius:1}}/></div></th>
                {isAdmin&&<th style={{width:cols.chk,padding:"10px 12px",textAlign:"center",borderRight:"1px solid #e5e7eb",position:"relative"}}><div style={C.chk(allSel)} onClick={toggleAll}>{allSel&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div><div className="resize-handle" onMouseDown={makeResize("chk")} onClick={e=>e.stopPropagation()}><div className="rh-line" style={{width:2,height:"60%",background:"#d1d5db",borderRadius:1}}/></div></th>}
                <TH k="sr" label="#"/>
                <TH k="vendor" label={<span style={{display:"inline-flex",alignItems:"center",gap:3,color:"#2563eb",fontSize:11}}>✏ Vendor</span>} onClick={()=>{setVendorSort(s=>s==="asc"?"desc":"asc");setAmountSort(null);}}/>
                <TH k="type" label="Type"/>
                <TH k="invoice" label={<span style={{display:"inline-flex",alignItems:"center",gap:3,color:"#2563eb",fontSize:11}}>✏ Invoice</span>}/>
                <TH k="amount" label={<SortBadge label="Amount" sort={amountSort} color="#9333ea" bg="#fdf4ff" border="#d8b4fe"/>} align="right" onClick={()=>{setAmountSort(s=>s==="asc"?"desc":"asc");setVendorSort(null);}}/>
                <TH k="status" label="Status" align="right"/>
                <TH k="date" label={<span style={{display:"inline-flex",alignItems:"center",gap:3}}><SortBadge label="✏ Date" sort={dateSort} color="#2563eb" bg="#eff6ff" border="#bfdbfe"/></span>} onClick={()=>{setDateSort(s=>s==="asc"?"desc":"asc");setVendorSort(null);setAmountSort(null);}}/>
                <TH k="remarks" label="Remarks" align="center"/>
                <TH k="actions" label="Actions" align="right"/>
              </tr>
            </thead>
            <tbody>
              {filtered.map((bill,idx)=>{
                const isSel=selected.has(bill.id);
                const amtStr=bill.totalAmount?`₹${Number(bill.totalAmount).toLocaleString("en-IN",{maximumFractionDigits:2})}`:"";
                return(
                  <React.Fragment key={bill.id}>
                    <tr className={isSel?"sel":""} style={{background:isSel?"#fef2f2":newlyImportedIds.has(bill.id)?"#dcfce7":idx%2===0?"#fff":"#fafafa",transition:"background 2s ease"}}>
                      <Thumb src={bill.thumbnail}/>
                      {isAdmin&&<td style={{padding:"10px 12px",textAlign:"center",borderRight:"1px solid #e5e7eb"}}><div style={C.chk(isSel)} onClick={()=>toggleSel(bill.id)}>{isSel&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}</div></td>}
                      <TipCell value={String(bill.srNo)} style={{color:"#9ca3af"}}/>
                      {isAdmin?<EditCell value={bill.vendorName} style={{fontWeight:600}} onSave={v=>quickUpdate(bill.id,"vendorName",v)}/>:<TipCell value={bill.vendorName} style={{fontWeight:600}}/>}
                      <td style={{padding:"10px 10px",overflow:"hidden",borderRight:"1px solid #e5e7eb"}}>{bill.vendorType?<span title={bill.vendorType} style={{background:"#eff6ff",color:"#2563eb",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"inline-block",maxWidth:"100%"}}>{bill.vendorType}</span>:<span style={{color:"#d1d5db"}}>—</span>}</td>
                      {isAdmin?<EditCell value={bill.invoiceNumber} style={{color:"#6b7280"}} onSave={v=>quickUpdate(bill.id,"invoiceNumber",v)}/>:<TipCell value={bill.invoiceNumber} style={{color:"#6b7280"}}/>}
                      <TipCell value={amtStr} style={{textAlign:"right",fontWeight:600}}/>
                      <td style={{padding:"10px 10px",textAlign:"right",borderRight:"1px solid #e5e7eb"}}>
                        <button onClick={()=>toggleStatus(bill.id)} title={`Mark as ${bill.paymentStatus==="Paid"?"Pending":"Paid"}`} style={{display:"inline-flex",alignItems:"center",gap:4,background:bill.paymentStatus==="Paid"?"#f0fdf4":"#fffbeb",color:bill.paymentStatus==="Paid"?"#16a34a":"#d97706",border:`1px solid ${bill.paymentStatus==="Paid"?"#86efac":"#fcd34d"}`,borderRadius:4,padding:"3px 9px",fontSize:11,fontWeight:500,cursor:"pointer"}}>
                          {bill.paymentStatus==="Paid"?"✓":"⏳"} {bill.paymentStatus}
                        </button>
                      </td>
                      {isAdmin?<EditCell value={bill.date} type="date" style={{color:"#6b7280"}} onSave={v=>quickUpdate(bill.id,"date",v)}/>:<TipCell value={bill.date?fmtDate(bill.date):""} style={{color:"#6b7280"}}/>}
                      <RemarksCell value={bill.remarks} isAdmin={isAdmin} onSave={v=>quickUpdate(bill.id,"remarks",v)}/>
                      {isAdmin&&<td style={{padding:"10px 10px",textAlign:"right",borderRight:"1px solid #e5e7eb"}}>
                        <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                          <button onClick={()=>editId===bill.id?(setEditId(null),setEditF({})):(setEditId(bill.id),setEditF({...bill}))} title="Full edit" style={{padding:"4px 8px",background:editId===bill.id?"#eff6ff":"transparent",border:"1px solid #e5e7eb",borderRadius:4,cursor:"pointer",fontSize:13}}>{editId===bill.id?"✕":"✏️"}</button>
                          <button onClick={()=>setDelTarget(bill.id)} title="Delete" style={{padding:"4px 8px",background:"transparent",border:"1px solid #fca5a5",borderRadius:4,cursor:"pointer",fontSize:13}}>🗑</button>
                        </div>
                      </td>}
                    </tr>
                    {isAdmin&&editId===bill.id&&(
                      <tr key={`e-${bill.id}`} style={{background:"#eff6ff",borderBottom:"1px solid #e5e7eb"}}>
                        <td colSpan={10} style={{padding:"14px 16px 18px"}}>
                          <p style={{fontSize:11,color:"#6b7280",marginBottom:10,fontWeight:500}}>Full edit — all fields</p>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:12}}>
                            {[["vendorName","Vendor name","text"],["invoiceNumber","Invoice #","text"],["date","Date","date"],["totalAmount","Amount (₹)","number"]].map(([k,lbl,t])=>(
                              <div key={k}><label style={{display:"block",fontSize:11,color:"#6b7280",marginBottom:4}}>{lbl}</label><input style={C.input} type={t} value={editF[k]||""} onChange={e=>setEditF(p=>({...p,[k]:e.target.value}))}/></div>
                            ))}
                            <div><label style={{display:"block",fontSize:11,color:"#6b7280",marginBottom:4}}>Vendor type</label><select style={C.input} value={editF.vendorType||""} onChange={e=>setEditF(p=>({...p,vendorType:e.target.value}))}><option value="">Select</option>{VENDOR_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                            <div><label style={{display:"block",fontSize:11,color:"#6b7280",marginBottom:4}}>Status</label><select style={C.input} value={editF.paymentStatus||"Pending"} onChange={e=>setEditF(p=>({...p,paymentStatus:e.target.value}))}><option>Pending</option><option>Paid</option></select></div>
                            <div style={{gridColumn:"1/-1"}}><label style={{display:"block",fontSize:11,color:"#6b7280",marginBottom:4}}>Remarks</label><input style={C.input} type="text" value={editF.remarks||""} onChange={e=>setEditF(p=>({...p,remarks:e.target.value}))} placeholder="Add notes…"/></div>
                          </div>
                          <div style={{display:"flex",gap:8}}>
                            <button style={C.blueBtn} onClick={saveEdit}>Save changes</button>
                            <button style={C.outBtn} onClick={()=>{setEditId(null);setEditF({});}}>Cancel</button>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {delTarget&&delTarget!=="bulk"&&(<div className="fade" style={{marginTop:12,padding:16,background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10}}><p style={{fontWeight:700,color:"#dc2626",marginBottom:4}}>Delete this bill?</p><p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>Permanently removed from cloud.</p><div style={{display:"flex",gap:8}}><button style={C.redBtn} onClick={()=>delOne(delTarget)}>Delete</button><button style={C.outBtn} onClick={()=>setDelTarget(null)}>Cancel</button></div></div>)}
      {delTarget==="bulk"&&(<div className="fade" style={{marginTop:12,padding:16,background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10}}><p style={{fontWeight:700,color:"#dc2626",marginBottom:4}}>Delete {ns} selected bill{ns>1?"s":""}?</p><p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>Permanently removed from cloud.</p><div style={{display:"flex",gap:8}}><button style={C.redBtn} onClick={delSel}>Delete {ns}</button><button style={C.outBtn} onClick={()=>setDelTarget(null)}>Cancel</button></div></div>)}
      {dupModal&&(<div className="fade" style={{marginTop:12,padding:16,background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:10}}><p style={{fontWeight:700,marginBottom:4}}>⚠️ Duplicate bill detected</p><p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>This matches an existing bill. Add it anyway?</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>{[{lbl:"Existing",b:dupModal.eb},{lbl:"New",b:dupModal.nb}].map(({lbl,b})=>(<div key={lbl} style={{background:"#fff",borderRadius:6,padding:"10px 12px",border:"1px solid #e5e7eb",fontSize:12}}><p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>{lbl}</p>{[["Vendor",b.vendorName],["Invoice",b.invoiceNumber],["Date",b.date?fmtDate(b.date):"—"],["Amount",b.totalAmount?`₹${Number(b.totalAmount).toLocaleString("en-IN")}`:"—"]].map(([k,v])=>(<div key={k} style={{marginBottom:3}}><span style={{color:"#9ca3af"}}>{k}: </span><span style={{fontWeight:600}}>{v||"—"}</span></div>))}</div>))}</div><div style={{display:"flex",gap:8}}><button style={{...C.redBtn,background:"#d97706"}} onClick={()=>{setDupModal(null);dupModal.r(true);}}>Add anyway</button><button style={C.outBtn} onClick={()=>{setDupModal(null);dupModal.r(false);}}>Skip</button></div></div>)}
      {toast&&(<div className="fade" style={{marginTop:12,padding:"10px 16px",background:toast.t==="err"?"#fef2f2":toast.t==="warn"?"#fffbeb":"#f0fdf4",border:`1px solid ${toast.t==="err"?"#fca5a5":toast.t==="warn"?"#fcd34d":"#86efac"}`,borderRadius:8,fontSize:13,fontWeight:600,color:toast.t==="err"?"#dc2626":toast.t==="warn"?"#d97706":"#16a34a"}}>{toast.msg}</div>)}
    </div>}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</body>
</html>
